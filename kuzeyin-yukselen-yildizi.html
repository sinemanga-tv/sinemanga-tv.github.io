<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kuzeyin Yükselen Yıldızı İzle | Sinemanga TV</title>
  <style>
    body {
      background-color: #0c0c0e;
      color: #ffffff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #141417;
      padding: 15px 40px;
      border-bottom: 2px solid #1f1f24;
    }
    header a {
      color: #ff3e3e;
      text-decoration: none;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 1px;
    }
    .container {
      max-width: 1000px;
      margin: 30px auto;
      padding: 0 20px;
    }
    .player-container {
      background-color: #141417;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #1f1f24;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
    }
    .player-container iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
      border-radius: 6px;
    }
    .movie-details {
      margin-top: 25px;
    }
    .movie-title {
      font-size: 28px;
      margin: 0 0 10px 0;
      color: #ffffff;
    }
    .movie-plot {
      color: #a1a1aa;
      line-height: 1.6;
      font-size: 15px;
    }
    .ad-box {
      background-color: #141417;
      width: 100%;
      height: 90px;
      margin-top: 30px;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 1px dashed #3f3f46;
      color: #71717a;
      font-size: 14px;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <header>
    <a href="index.html">← SİNEMANGA TV</a>
  </header>

  <div class="container">
    
    <!-- Google Drive Video Oynatıcısı -->
    <div class="player-container">
      <iframe src="https://drive.google.com/file/d/1IWGmCupGmGgDfXegEfsTlIoZOMgPRW9H/preview" allow="autoplay" allowfullscreen></iframe>
    </div>

    <div class="movie-details">
      <h2 class="movie-title">Kuzeyin Yükselen Yıldızı</h2>
      <p class="movie-plot">
        İyi seyirler dileriz! Filmi izledikten sonra yorum yapmayı unutmayın.
      </p>
    </div>

    <div class="ad-box">
      Sponsorlu Bağlantı / Reklam Alanı
    </div>

  </div>

</body>
</html>
