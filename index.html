<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sinemanga TV | Film & Anime Platformu</title>
  <style>
    body {
      background-color: #0c0c0e;
      color: #ffffff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
    }
    header {
      background-color: #141417;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px solid #1f1f24;
    }
    header h1 {
      margin: 0;
      font-size: 24px;
      color: #ff3e3e;
      letter-spacing: 2px;
      font-weight: 800;
    }
    .ad-banner {
      background-color: #141417;
      width: 100%;
      max-width: 728px;
      height: 90px;
      margin: 20px auto;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 1px dashed #3f3f46;
      color: #71717a;
      font-size: 14px;
      border-radius: 4px;
    }
    .container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .section-title {
      font-size: 20px;
      margin-bottom: 20px;
      color: #a1a1aa;
      border-left: 4px solid #ff3e3e;
      padding-left: 10px;
    }
    .movie-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 25px;
    }
    .movie-card {
      background-color: #141417;
      border-radius: 8px;
      overflow: hidden;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      cursor: pointer;
      border: 1px solid #1f1f24;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .movie-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 10px 20px rgba(255, 62, 62, 0.1);
      border-color: #ff3e3e;
    }
    .movie-info {
      padding: 15px;
    }
    .movie-title {
      margin: 0;
      font-size: 16px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .movie-meta {
      margin-top: 5px;
      font-size: 12px;
      color: #a1a1aa;
    }
  </style>
</head>
<body>

  <header>
    <h1>SİNEMANGA TV</h1>
    <span style="color: #a1a1aa; font-size: 14px; letter-spacing: 1px;">FİLM & ANİME</span>
  </header>

  <div class="container">
    <div class="ad-banner">
      Sponsorlu Bağlantı / Reklam Alanı
    </div>

    <h2 class="section-title">Son Eklenenler</h2>
    
    <div class="movie-grid">
      
      <!-- Kuzeyin Yükselen Yıldızı Kartı -->
      <a href="kuzeyin-yukselen-yildizi.html" class="movie-card">
        <div style="width: 100%; height: 280px; overflow: hidden;">
          <!-- Kodun içine afişi doğrudan güvenli bir linkten yerleştirdim -->
          <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgRUgL1rPv_B9SggD6JuV_Lvx0vj15W-Z_zek7nKj6WyyT6a9G5I8MuUlH9wGfKqg_mG35pE90wF-E-5M_R08m8DqFCHi_GZ_G8u7wUj6E1_W5vXy7v_C7v_S7v" alt="Kuzeyin Yükselen Yıldızı" style="width: 100%; height: 100%; object-fit: cover;">
        </div>
        <div class="movie-info">
          <h3 class="movie-title">Kuzeyin Yükselen Yıldızı</h3>
          <div class="movie-meta">Full HD • Türkçe Dublaj</div>
        </div>
      </a>

    </div>
  </div>

</body>
</html>
